[tool.ruff]
target-version = "py313"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "B", "RUF"]
ignore = [
  "E501",    # Line too long — regex lines exceed 120
  "E401",    # Multiple imports on one line — cleanup later
  "E402",    # Module level import not at top — FastAPI pattern
  "E701",    # Multiple statements on one line — compact handlers
  "E702",    # Multiple statements on one line (semicolon)
  "E731",    # Lambda assignment — response pools
  "E741",    # Ambiguous variable name (l, O, I) — existing code
  "F401",    # Unused imports — may be re-exports, cleanup later
  "F541",    # f-string without placeholders — cleanup later
  "F841",    # Local variable assigned but unused — cleanup later
  "B007",    # Loop control variable not used — cleanup later
  "B008",    # Function call in default argument — FastAPI Depends()
  "B033",    # Sets should not contain duplicate items — cleanup later
  "B904",    # Within except, raise from — cleanup later
  "B905",    # zip without strict — cleanup later
  "RUF001",  # Ambiguous unicode character — i18n strings
  "RUF002",  # Ambiguous unicode character in docstring
  "RUF003",  # Ambiguous unicode character in comment
  "RUF005",  # Collection literal concatenation — cleanup later
  "RUF006",  # Invalid index type — cleanup later
  "RUF012",  # Mutable class variables — cleanup later
  "RUF013",  # PEP 484 implicit Optional — cleanup later
  "RUF022",  # __all__ not sorted — cleanup later
  "RUF059",  # Unused private variable — cleanup later
  "RUF100",  # Unused noqa directive — rules disabled temporarily
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B011", "S101", "E741"]
"config/js_i18n.py" = ["E501"]

