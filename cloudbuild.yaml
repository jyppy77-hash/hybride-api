substitutions:
  # SÉCURITÉ : _OWNER_IP et _OWNER_IPV6 ne doivent PAS contenir de vraies valeurs ici.
  # Les définir dans : Console GCP > Cloud Build > Triggers > [trigger] > Substitution variables
  # Ou via : gcloud builds submit --substitutions=_OWNER_IP=x.x.x.x,_OWNER_IPV6=prefix:
  _OWNER_IP: ''
  _OWNER_IPV6: ''

steps:
  # Build Docker image (builder stage — includes tests/)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--target=builder'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/hybride-api/hybride-api:builder'
      - '.'

  # Lint (ruff)
  - name: 'europe-west1-docker.pkg.dev/$PROJECT_ID/hybride-api/hybride-api:builder'
    entrypoint: 'sh'
    args:
      - '-c'
      - 'pip install --no-cache-dir ruff==0.15.7 && ruff check .'
    env:
      - 'HOME=/tmp'

  # Run 4719 tests inside the builder image (blocks deploy on failure)
  - name: 'europe-west1-docker.pkg.dev/$PROJECT_ID/hybride-api/hybride-api:builder'
    entrypoint: 'sh'
    args:
      - '-c'
      - 'pip install --no-cache-dir pytest==9.0.2 pytest-asyncio==1.3.0 pytest-cov==7.0.0 PyPDF2==3.0.1 && python -m pytest tests/ -v --tb=short --cov=services --cov=routes --cov=config --cov=engine --cov=middleware --cov-report=term-missing --cov-fail-under=70 -o addopts='
    env:
      - 'DB_PASSWORD=fake'
      - 'DB_USER=test'
      - 'DB_NAME=testdb'
      - 'HOME=/tmp'

  # Build final runtime image (lean, no tests)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--target=runtime'
      - '--cache-from'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/hybride-api/hybride-api:latest'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/hybride-api/hybride-api:$COMMIT_SHA'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/hybride-api/hybride-api:latest'
      - '.'

  # Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'europe-west1-docker.pkg.dev/$PROJECT_ID/hybride-api/hybride-api:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'europe-west1-docker.pkg.dev/$PROJECT_ID/hybride-api/hybride-api:latest']

  # Deploy to Cloud Run — no traffic (I10 V66: smoke test before routing)
  # SAFETY: only pass --update-env-vars when substitutions are non-empty,
  # otherwise existing env vars (OWNER_IP, secrets) are wiped to empty strings.
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        CMD="gcloud run deploy hybride-api-eu \
          --image=europe-west1-docker.pkg.dev/$PROJECT_ID/hybride-api/hybride-api:$COMMIT_SHA \
          --region=europe-west1 \
          --platform=managed \
          --allow-unauthenticated \
          --port=8080 \
          --memory=1Gi \
          --cpu=1 \
          --concurrency=40 \
          --max-instances=5 \
          --min-instances=1 \
          --timeout=120 \
          --cpu-boost \
          --no-traffic \
          --liveness-probe=httpGet.path=/health,httpGet.port=8080 \
          --startup-probe=httpGet.path=/health,httpGet.port=8080"
        if [ -n "${_OWNER_IP}" ] && [ -n "${_OWNER_IPV6}" ]; then
          CMD="$$CMD --update-env-vars=OWNER_IP=${_OWNER_IP},OWNER_IPV6=${_OWNER_IPV6}"
        else
          echo "WARNING: _OWNER_IP or _OWNER_IPV6 empty — skipping --update-env-vars to preserve existing values"
        fi
        eval $$CMD

  # Smoke test /health on the new revision (I10 V66)
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        REVISION_URL=$$(gcloud run revisions list \
          --service=hybride-api-eu \
          --region=europe-west1 \
          --sort-by=~CREATED \
          --limit=1 \
          --format='value(status.url)' 2>/dev/null)
        if [ -z "$$REVISION_URL" ]; then
          echo "SMOKE TEST SKIPPED: could not resolve revision URL"
          exit 0
        fi
        echo "SMOKE TEST: curling $$REVISION_URL/health"
        HTTP_CODE=$$(curl -s -o /dev/null -w "%{http_code}" "$$REVISION_URL/health" --max-time 10 2>/dev/null || echo "000")
        if [ "$$HTTP_CODE" != "200" ]; then
          echo "SMOKE TEST FAILED: /health returned $$HTTP_CODE"
          exit 1
        fi
        echo "SMOKE TEST PASSED: /health returned 200"

  # Route 100% traffic to new revision (I10 V66)
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - run
      - services
      - update-traffic
      - hybride-api-eu
      - --to-latest
      - --region=europe-west1

images:
  - europe-west1-docker.pkg.dev/$PROJECT_ID/hybride-api/hybride-api:$COMMIT_SHA
  - europe-west1-docker.pkg.dev/$PROJECT_ID/hybride-api/hybride-api:latest
