steps:
  # Build Docker image (builder stage — includes tests/)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--target=builder'
      - '-t'
      - 'gcr.io/$PROJECT_ID/hybride-api:test'
      - '.'

  # Run 2310 tests inside the builder image (blocks deploy on failure)
  - name: 'gcr.io/$PROJECT_ID/hybride-api:test'
    entrypoint: 'sh'
    args:
      - '-c'
      - 'pip install --no-cache-dir pytest pytest-asyncio pytest-cov PyPDF2 && python -m pytest tests/ -v --tb=short -o addopts='
    env:
      - 'DB_PASSWORD=fake'
      - 'DB_USER=test'
      - 'DB_NAME=testdb'
      - 'HOME=/tmp'

  # Build final runtime image (lean, no tests)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--target=runtime'
      - '--cache-from'
      - 'gcr.io/$PROJECT_ID/hybride-api:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/hybride-api:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/hybride-api:latest'
      - '.'

  # Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/hybride-api:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/hybride-api:latest']

  # Deploy to Cloud Run (europe-west1)
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - run
      - deploy
      - hybride-api-eu
      - --image=gcr.io/$PROJECT_ID/hybride-api:$COMMIT_SHA
      - --region=europe-west1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=1Gi
      - --cpu=1
      - --concurrency=40
      - --max-instances=5
      - --min-instances=1
      - --timeout=120
      - --cpu-boost
      - '--update-env-vars=OWNER_IP=86.212.92.243,OWNER_IPV6=2a01:cb05:8700:5900:'

images:
  - gcr.io/$PROJECT_ID/hybride-api:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/hybride-api:latest
