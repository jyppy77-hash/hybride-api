{% extends "admin/_base.html" %}
{% block title %}Configuration{% endblock %}

{% block content %}
    <h2>Configuration Entreprise</h2>

    {% if success %}
    <div class="alert-success">Configuration enregistree.</div>
    {% endif %}

    <form method="POST" class="admin-form" onsubmit="return confirm('Enregistrer les modifications ?')">
        <div class="form-row">
            <div class="form-group">
                <label>Raison sociale</label>
                <input type="text" name="raison_sociale" value="{{ cfg.raison_sociale or '' }}">
            </div>
            <div class="form-group">
                <label>SIRET</label>
                <input type="text" name="siret" value="{{ cfg.siret or '' }}">
            </div>
        </div>
        <div class="form-group">
            <label>Adresse</label>
            <textarea name="adresse" rows="2">{{ cfg.adresse or '' }}</textarea>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Code postal</label>
                <input type="text" name="code_postal" value="{{ cfg.code_postal or '' }}">
            </div>
            <div class="form-group">
                <label>Ville</label>
                <input type="text" name="ville" value="{{ cfg.ville or '' }}">
            </div>
            <div class="form-group">
                <label>Pays</label>
                <input type="text" name="pays" value="{{ cfg.pays or 'France' }}">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ cfg.email or '' }}">
            </div>
            <div class="form-group">
                <label>Telephone</label>
                <input type="text" name="telephone" value="{{ cfg.telephone or '' }}">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>N TVA intracommunautaire</label>
                <input type="text" name="tva_intra" value="{{ cfg.tva_intra or '' }}">
            </div>
            <div class="form-group">
                <label>Taux TVA (%)</label>
                <input type="number" step="0.01" name="taux_tva" value="{{ cfg.taux_tva or 20 }}">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>IBAN</label>
                <input type="text" name="iban" value="{{ cfg.iban or '' }}">
            </div>
            <div class="form-group">
                <label>BIC</label>
                <input type="text" name="bic" value="{{ cfg.bic or '' }}">
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-action">Enregistrer</button>
        </div>
    </form>

    <h2 style="margin-top:2.5rem;">Alertes Monitoring</h2>
    {% if alert_success %}
    <div class="alert-success">Seuils d'alertes enregistres.</div>
    {% endif %}
    <form method="POST" action="/admin/config/alerts" class="admin-form" onsubmit="return confirm('Enregistrer les seuils ?')">
        <div class="form-row">
            <div class="form-group">
                <label>Taux erreur 5xx — warning (%)</label>
                <input type="number" step="0.1" name="alert_error_rate_warn" value="{{ alert_cfg.alert_error_rate_warn }}">
            </div>
            <div class="form-group">
                <label>Taux erreur 5xx — critical (%)</label>
                <input type="number" step="0.1" name="alert_error_rate_crit" value="{{ alert_cfg.alert_error_rate_crit }}">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Latence P95 — warning (ms)</label>
                <input type="number" step="100" name="alert_latency_p95_warn" value="{{ alert_cfg.alert_latency_p95_warn }}">
            </div>
            <div class="form-group">
                <label>Latence P95 — critical (ms)</label>
                <input type="number" step="100" name="alert_latency_p95_crit" value="{{ alert_cfg.alert_latency_p95_crit }}">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>CPU — warning (%)</label>
                <input type="number" step="1" name="alert_cpu_warn" value="{{ (alert_cfg.alert_cpu_warn|float * 100)|round(0)|int }}">
            </div>
            <div class="form-group">
                <label>CPU — critical (%)</label>
                <input type="number" step="1" name="alert_cpu_crit" value="{{ (alert_cfg.alert_cpu_crit|float * 100)|round(0)|int }}">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>RAM — warning (%)</label>
                <input type="number" step="1" name="alert_memory_warn" value="{{ (alert_cfg.alert_memory_warn|float * 100)|round(0)|int }}">
            </div>
            <div class="form-group">
                <label>RAM — critical (%)</label>
                <input type="number" step="1" name="alert_memory_crit" value="{{ (alert_cfg.alert_memory_crit|float * 100)|round(0)|int }}">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Gemini temps moyen — warning (ms)</label>
                <input type="number" step="100" name="alert_gemini_avg_warn" value="{{ alert_cfg.alert_gemini_avg_warn }}">
            </div>
            <div class="form-group">
                <label>Gemini temps moyen — critical (ms)</label>
                <input type="number" step="100" name="alert_gemini_avg_crit" value="{{ alert_cfg.alert_gemini_avg_crit }}">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Cout mensuel — warning (EUR)</label>
                <input type="number" step="1" name="alert_cost_month_warn" value="{{ alert_cfg.alert_cost_month_warn }}">
            </div>
            <div class="form-group">
                <label>Cout mensuel — critical (EUR)</label>
                <input type="number" step="1" name="alert_cost_month_crit" value="{{ alert_cfg.alert_cost_month_crit }}">
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-action">Enregistrer les seuils</button>
        </div>
    </form>
{% endblock %}
