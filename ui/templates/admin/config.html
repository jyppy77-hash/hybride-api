{% extends "admin/_base.html" %}
{% block title %}Configuration{% endblock %}

{% block content %}
    <h2>Configuration Entreprise</h2>

    {% if success %}
    <div class="alert-success">Configuration enregistree.</div>
    {% endif %}

    <form method="POST" class="admin-form">
        <div class="form-row">
            <div class="form-group">
                <label>Raison sociale</label>
                <input type="text" name="raison_sociale" value="{{ cfg.raison_sociale or '' }}">
            </div>
            <div class="form-group">
                <label>SIRET</label>
                <input type="text" name="siret" value="{{ cfg.siret or '' }}">
            </div>
        </div>
        <div class="form-group">
            <label>Adresse</label>
            <textarea name="adresse" rows="2">{{ cfg.adresse or '' }}</textarea>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Code postal</label>
                <input type="text" name="code_postal" value="{{ cfg.code_postal or '' }}">
            </div>
            <div class="form-group">
                <label>Ville</label>
                <input type="text" name="ville" value="{{ cfg.ville or '' }}">
            </div>
            <div class="form-group">
                <label>Pays</label>
                <input type="text" name="pays" value="{{ cfg.pays or 'France' }}">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ cfg.email or '' }}">
            </div>
            <div class="form-group">
                <label>Telephone</label>
                <input type="text" name="telephone" value="{{ cfg.telephone or '' }}">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>N TVA intracommunautaire</label>
                <input type="text" name="tva_intra" value="{{ cfg.tva_intra or '' }}">
            </div>
            <div class="form-group">
                <label>Taux TVA (%)</label>
                <input type="number" step="0.01" name="taux_tva" value="{{ cfg.taux_tva or 20 }}">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>IBAN</label>
                <input type="text" name="iban" value="{{ cfg.iban or '' }}">
            </div>
            <div class="form-group">
                <label>BIC</label>
                <input type="text" name="bic" value="{{ cfg.bic or '' }}">
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-action">Enregistrer</button>
        </div>
    </form>
{% endblock %}
