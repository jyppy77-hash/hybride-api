<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>LotoIA Admin — Connexion</title>
    <link rel="stylesheet" href="/static/admin.css?v=4">
    <script>
    (function(){var c=document.cookie.match(/admin_theme=(\w+)/);if(c&&c[1]==='light')document.documentElement.style.background='#f4f5f7';})();
    </script>
</head>
<body class="login-body">
    <script>
    (function(){var c=document.cookie.match(/admin_theme=(\w+)/);if(c&&c[1]==='light')document.body.classList.add('light');})();
    </script>
    <div class="login-card">
        <h1><span style="color:#d4a843">Loto</span>IA — Admin</h1>
        {% if error %}
        <div class="login-error">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/admin/login" autocomplete="off">
            <label for="password">Mot de passe</label>
            <input type="password" id="password" name="password" required autofocus>
            <button type="submit">Connexion</button>
        </form>
        <div style="text-align:center; margin-top:1rem;">
            <button class="btn-theme" id="theme-toggle" title="Changer de theme" style="background:var(--ghost-bg); border-color:var(--border); color:var(--text);"></button>
        </div>
    </div>
    <script>
    (function(){
        var btn=document.getElementById('theme-toggle');
        function isDark(){return !document.body.classList.contains('light');}
        function update(){btn.textContent=isDark()?'\u2600\uFE0F':'\uD83C\uDF19';}
        btn.addEventListener('click',function(){
            document.body.classList.toggle('light');
            var theme=isDark()?'dark':'light';
            document.cookie='admin_theme='+theme+';path=/admin;max-age=31536000;SameSite=Strict';
            update();
        });
        update();
    })();
    </script>
</body>
</html>
