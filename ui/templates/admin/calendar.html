{% extends "admin/_base.html" %}
{% block title %}Calendrier{% endblock %}

{% block content %}
    <h2>Calendrier — Heatmap Mensuel <span class="rt-dot rt-dot-live" id="cal-live-dot" title="Auto-refresh 10s"></span></h2>

    <!-- Controls -->
    <div class="cal-controls">
        <button class="cal-nav-btn" id="cal-prev" title="Mois precedent">&#9664;</button>
        <span class="cal-month-label" id="cal-month-label"></span>
        <button class="cal-nav-btn" id="cal-next" title="Mois suivant">&#9654;</button>
        <select class="cal-select" id="cal-metric">
            <option value="visitors" selected>Visiteurs</option>
            <option value="impressions">Impressions</option>
            <option value="sessions">Événements</option>
            <option value="chatbot">Chatbot</option>
        </select>
    </div>

    <!-- Calendar grid -->
    <div class="cal-grid" id="cal-grid">
        <div class="cal-header">Lun</div>
        <div class="cal-header">Mar</div>
        <div class="cal-header">Mer</div>
        <div class="cal-header">Jeu</div>
        <div class="cal-header">Ven</div>
        <div class="cal-header">Sam</div>
        <div class="cal-header">Dim</div>
    </div>

    <!-- Legend -->
    <div class="cal-legend">
        <span class="cal-legend-item"><span class="cal-legend-color cal-level-0"></span> 0</span>
        <span class="cal-legend-item"><span class="cal-legend-color cal-level-1"></span> Faible</span>
        <span class="cal-legend-item"><span class="cal-legend-color cal-level-2"></span> Moyen</span>
        <span class="cal-legend-item"><span class="cal-legend-color cal-level-3"></span> Fort</span>
        <span class="cal-legend-item"><span class="cal-legend-color cal-level-4"></span> Max</span>
    </div>

    <!-- Tooltip -->
    <div id="cal-tooltip" class="cal-tooltip"></div>
{% endblock %}

{% block scripts %}
<script>
    if (typeof LotoAdmin !== 'undefined' && LotoAdmin.initCalendar) {
        LotoAdmin.initCalendar();
    }
</script>
{% endblock %}
