{% extends "admin/_base.html" %}
{% block title %}Calendrier{% endblock %}

{% block content %}
    <h2>Calendrier — Heatmap Mensuel</h2>

    <!-- Controls -->
    <div class="cal-controls">
        <button class="cal-nav-btn" id="cal-prev" title="Mois precedent">&#9664;</button>
        <span class="cal-month-label" id="cal-month-label"></span>
        <button class="cal-nav-btn" id="cal-next" title="Mois suivant">&#9654;</button>
        <select class="cal-select" id="cal-metric">
            <option value="visitors" selected>Visiteurs</option>
            <option value="impressions">Impressions</option>
            <option value="sessions">Sessions</option>
            <option value="chatbot">Chatbot</option>
        </select>
    </div>

    <!-- Calendar grid -->
    <div class="cal-grid" id="cal-grid">
        <div class="cal-header">Lun</div>
        <div class="cal-header">Mar</div>
        <div class="cal-header">Mer</div>
        <div class="cal-header">Jeu</div>
        <div class="cal-header">Ven</div>
        <div class="cal-header">Sam</div>
        <div class="cal-header">Dim</div>
    </div>

    <!-- Legend -->
    <div class="cal-legend">
        <span class="cal-legend-item"><span class="cal-legend-color cal-level-0"></span> 0</span>
        <span class="cal-legend-item"><span class="cal-legend-color cal-level-1"></span> Faible</span>
        <span class="cal-legend-item"><span class="cal-legend-color cal-level-2"></span> Moyen</span>
        <span class="cal-legend-item"><span class="cal-legend-color cal-level-3"></span> Fort</span>
        <span class="cal-legend-item"><span class="cal-legend-color cal-level-4"></span> Max</span>
    </div>

    <!-- Tooltip -->
    <div id="cal-tooltip" class="cal-tooltip"></div>
{% endblock %}

{% block scripts %}
<script>
(function() {
    'use strict';

    var MONTHS_FR = ['Janvier','Fevrier','Mars','Avril','Mai','Juin',
                     'Juillet','Aout','Septembre','Octobre','Novembre','Decembre'];

    var now = new Date();
    var state = {
        year: now.getFullYear(),
        month: now.getMonth() + 1,
        data: null,
        metric: 'visitors'
    };

    var grid = document.getElementById('cal-grid');
    var label = document.getElementById('cal-month-label');
    var tooltip = document.getElementById('cal-tooltip');
    var metricSelect = document.getElementById('cal-metric');

    // ── Fetch data ──────────────────────────────────────────────────
    function fetchData() {
        label.textContent = MONTHS_FR[state.month - 1] + ' ' + state.year;
        fetch('/admin/api/calendar-data?year=' + state.year + '&month=' + state.month)
            .then(function(r) { return r.json(); })
            .then(function(d) {
                state.data = d;
                render();
            })
            .catch(function(e) {
                console.error('[Calendar] fetch error:', e);
            });
    }

    // ── Quantile levels ─────────────────────────────────────────────
    function calcLevels(days, metric) {
        var vals = [];
        for (var k in days) {
            var v = days[k][metric];
            if (v > 0) vals.push(v);
        }
        if (vals.length === 0) return function() { return 0; };
        vals.sort(function(a, b) { return a - b; });
        var q1 = vals[Math.floor(vals.length * 0.25)] || vals[0];
        var q2 = vals[Math.floor(vals.length * 0.50)] || vals[0];
        var q3 = vals[Math.floor(vals.length * 0.75)] || vals[0];
        return function(v) {
            if (v <= 0) return 0;
            if (v <= q1) return 1;
            if (v <= q2) return 2;
            if (v <= q3) return 3;
            return 4;
        };
    }

    // ── Render calendar ─────────────────────────────────────────────
    function render() {
        if (!state.data) return;

        // Remove old day cells (keep headers)
        var old = grid.querySelectorAll('.cal-day');
        for (var i = 0; i < old.length; i++) old[i].remove();

        var days = state.data.days;
        var metric = state.metric;
        var getLevel = calcLevels(days, metric);

        // Day of week for 1st of month (0=Mon in our grid)
        // JS: getDay() returns 0=Sun, so we convert
        var firstDate = new Date(state.year, state.month - 1, 1);
        var startDow = (firstDate.getDay() + 6) % 7; // 0=Mon

        var numDays = Object.keys(days).length;

        // Today check
        var todayNow = new Date();
        var isCurrentMonth = (state.year === todayNow.getFullYear() && state.month === todayNow.getMonth() + 1);
        var todayDay = todayNow.getDate();

        // Empty cells before 1st
        for (var e = 0; e < startDow; e++) {
            var empty = document.createElement('div');
            empty.className = 'cal-day empty';
            grid.appendChild(empty);
        }

        // Day cells
        for (var d = 1; d <= numDays; d++) {
            var dayData = days[String(d)];
            var val = dayData ? dayData[metric] : 0;
            var level = getLevel(val);

            var cell = document.createElement('div');
            cell.className = 'cal-day cal-level-' + level;
            if (isCurrentMonth && d === todayDay) {
                cell.className += ' cal-today';
            }

            var numSpan = document.createElement('span');
            numSpan.className = 'cal-day-num';
            numSpan.textContent = d;

            var valSpan = document.createElement('span');
            valSpan.className = 'cal-day-val';
            valSpan.textContent = val;

            cell.appendChild(numSpan);
            cell.appendChild(valSpan);

            // Store day data for tooltip
            cell._dayData = dayData;
            cell._dayNum = d;

            cell.addEventListener('mouseenter', showTooltip);
            cell.addEventListener('mouseleave', hideTooltip);

            grid.appendChild(cell);
        }

        // Empty cells after last day to complete the grid row
        var totalCells = startDow + numDays;
        var trailing = totalCells % 7;
        if (trailing > 0) {
            for (var t = 0; t < 7 - trailing; t++) {
                var emptyEnd = document.createElement('div');
                emptyEnd.className = 'cal-day empty';
                grid.appendChild(emptyEnd);
            }
        }
    }

    // ── Tooltip ─────────────────────────────────────────────────────
    function showTooltip(e) {
        var cell = e.currentTarget;
        var d = cell._dayData;
        if (!d) return;
        tooltip.innerHTML =
            '<strong>' + cell._dayNum + ' ' + MONTHS_FR[state.month - 1] + ' ' + state.year + '</strong><br>' +
            'Visiteurs: <b>' + d.visitors + '</b><br>' +
            'Sessions: <b>' + d.sessions + '</b><br>' +
            'Impressions: <b>' + d.impressions + '</b><br>' +
            'Chatbot: <b>' + d.chatbot + '</b>';
        tooltip.style.display = 'block';

        var rect = cell.getBoundingClientRect();
        tooltip.style.left = rect.left + 'px';
        tooltip.style.top = (rect.bottom + 6) + 'px';
    }

    function hideTooltip() {
        tooltip.style.display = 'none';
    }

    // ── Navigation ──────────────────────────────────────────────────
    document.getElementById('cal-prev').addEventListener('click', function() {
        state.month--;
        if (state.month < 1) { state.month = 12; state.year--; }
        fetchData();
    });

    document.getElementById('cal-next').addEventListener('click', function() {
        state.month++;
        if (state.month > 12) { state.month = 1; state.year++; }
        fetchData();
    });

    metricSelect.addEventListener('change', function() {
        state.metric = this.value;
        render();
    });

    // ── Init ────────────────────────────────────────────────────────
    fetchData();
})();
</script>
{% endblock %}
