{% extends "admin/_base.html" %}
{% block title %}Realtime{% endblock %}

{% block content %}
    <h2 id="rt-title">Realtime Feed <span class="rt-dot rt-dot-live"></span></h2>

    <!-- ── Period toggle + Export ────────────────────────────────── -->
    <div class="rt-toolbar">
        <div class="rt-period-toggle" id="rt-period-toggle">
            <button class="rt-period-btn active" data-period="24h">24h</button>
            <button class="rt-period-btn" data-period="today">Aujourd'hui</button>
            <button class="rt-period-btn" data-period="week">7 jours</button>
            <button class="rt-period-btn" data-period="month">30 jours</button>
        </div>
        <div class="rt-export-bar">
            <a id="rt-export-csv" class="btn-secondary btn-sm" href="/admin/export/realtime/csv?period=24h">📥 CSV</a>
            <a id="rt-export-pdf" class="btn-secondary btn-sm" href="/admin/export/realtime/pdf?period=24h">📄 PDF</a>
        </div>
    </div>

    <!-- ── Summary KPI ──────────────────────────────────────────── -->
    <div class="kpi-grid" id="rt-kpi">
        <div class="kpi-card rt-kpi-visitors">
            <span class="kpi-value rt-kpi-accent-amber" id="kpi-visitors">-</span>
            <span class="kpi-label">Visiteurs uniques</span>
        </div>
        <div class="kpi-card rt-kpi-total">
            <span class="kpi-value rt-kpi-accent-gold" id="kpi-total">-</span>
            <span class="kpi-label" id="kpi-total-label">Events aujourd'hui</span>
        </div>
        <div class="kpi-card rt-kpi-hour">
            <span class="kpi-value rt-kpi-accent-muted" id="kpi-hour">-</span>
            <span class="kpi-label">Derniere heure</span>
        </div>
        <div class="kpi-card rt-kpi-types">
            <span class="kpi-value rt-kpi-accent-blue" id="kpi-types">-</span>
            <span class="kpi-label">Types distincts</span>
        </div>
    </div>

    <!-- ── KPI cards by type ────────────────────────────────────── -->
    <div class="rt-type-cards" id="rt-type-cards"></div>

    <!-- ── Activity heatmap (60 min) ─────────────────────────────── -->
    <div class="rt-heatmap-wrap">
        <div class="rt-heatmap-label">Activite (60 dernieres min)</div>
        <div class="rt-heatmap" id="rt-heatmap"></div>
    </div>

    <!-- ── Filters ────────────────────────────────────────────────── -->
    <div class="rt-filters-card">
        <div class="rt-filters-top">
            <select id="f-event-type" class="rt-select">
                <option value="all" selected>Tous les events</option>
                <option value="alert_warning">⚠️ Alertes warning</option>
                <option value="alert_critical">🔴 Alertes critical</option>
            </select>
            <label class="rt-toggle-auto">
                <span class="rt-toggle-label">Auto-refresh</span>
                <span class="rt-pill-toggle">
                    <input type="checkbox" id="rt-auto" checked>
                    <span class="rt-pill-slider"></span>
                </span>
            </label>
        </div>
    </div>

    <!-- ── Event feed ─────────────────────────────────────────────── -->
    <div class="rt-feed" id="rt-feed"></div>
{% endblock %}

{% block scripts %}
<script src="/static/admin.js?v=10"></script>
<script>LotoAdmin.initRealtime();</script>
{% endblock %}
