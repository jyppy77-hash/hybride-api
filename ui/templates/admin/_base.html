<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>LotoIA Admin — {% block title %}Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="/static/admin.css?v=15">
    <link rel="stylesheet" href="/static/admin-pool.css?v=2">
    <script>
    (function(){var c=document.cookie.match(/admin_theme=(\w+)/);if(c&&c[1]==='light')document.documentElement.style.background='#f5f5f5';})();
    </script>
    {% block head %}{% endblock %}
</head>
<body>
    <script>
    (function(){var c=document.cookie.match(/admin_theme=(\w+)/);if(c&&c[1]==='light')document.body.classList.add('light');})();
    </script>
    <header class="admin-header">
        <nav class="admin-topnav">
            <a href="/admin" class="topnav-brand"><span>Loto</span>IA Admin</a>
            <a href="/admin" class="topnav-link{% if active == 'dashboard' %} active{% endif %}">Dashboard</a>
            <a href="/admin/calendar" class="topnav-link{% if active == 'calendar' %} active{% endif %}">Calendrier</a>
            <a href="/admin/calendar-perf" class="topnav-link{% if active == 'calendar-perf' %} active{% endif %}">Performance</a>
            <a href="/admin/impressions" class="topnav-link{% if active == 'impressions' %} active{% endif %}">Impressions</a>
            <a href="/admin/engagement" class="topnav-link{% if active == 'engagement' %} active{% endif %}">Engagement</a>
            <a href="/admin/votes" class="topnav-link{% if active == 'votes' %} active{% endif %}" id="nav-votes">Votes <span class="votes-badge" id="votes-badge" style="display:none;background:#22c55e;color:#fff;font-size:0.7rem;padding:1px 6px;border-radius:10px;margin-left:4px;"></span></a>
            <a href="/admin/messages" class="topnav-link{% if active == 'messages' %} active{% endif %}" id="nav-messages">Messages <span class="msg-badge" id="msg-badge" style="display:none;background:#ef4444;color:#fff;font-size:0.7rem;padding:1px 6px;border-radius:10px;margin-left:4px;"></span></a>
            <a href="/admin/chatbot-monitor" class="topnav-link{% if active == 'chatbot' %} active{% endif %}">Chatbot <span class="rt-dot"></span></a>
            <a href="/admin/realtime" class="topnav-link{% if active == 'realtime' %} active{% endif %}">Realtime <span class="rt-dot"></span></a>
            <a href="/admin/sponsors" class="topnav-link{% if active == 'sponsors' %} active{% endif %}">Sponsors</a>
            <a href="/admin/factures" class="topnav-link{% if active == 'factures' %} active{% endif %}">Factures</a>
            <a href="/admin/contrats" class="topnav-link{% if active == 'contrats' %} active{% endif %}">Contrats</a>
            <a href="/admin/tarifs" class="topnav-link{% if active == 'tarifs' %} active{% endif %}">Tarifs</a>
            <a href="/admin/activity" class="topnav-link{% if active == 'activity' %} active{% endif %}">Activity <span class="rt-dot"></span></a>
            <a href="/admin/monitoring" class="topnav-link{% if active == 'monitoring' %} active{% endif %}">Monitoring <span class="rt-dot"></span></a>
            <a href="/admin/config" class="topnav-link{% if active == 'config' %} active{% endif %}">Config</a>
        </nav>
        <div class="header-right">
            <button class="btn-theme" id="theme-toggle" title="Changer de theme"></button>
            <a href="/admin/logout" class="btn-logout">Deconnexion</a>
        </div>
    </header>
    <main class="admin-main">
        {% block content %}{% endblock %}
    </main>
    <script>
    (function(){
        var btn=document.getElementById('theme-toggle');
        function isDark(){return !document.body.classList.contains('light');}
        function update(){btn.textContent=isDark()?'\u2600\uFE0F':'\uD83C\uDF19';}
        btn.addEventListener('click',function(){
            document.body.classList.toggle('light');
            var theme=isDark()?'dark':'light';
            document.cookie='admin_theme='+theme+';path=/admin;max-age=31536000;SameSite=Strict';
            update();
        });
        update();
    })();
    </script>
    <script>
    (function(){
        fetch('/admin/api/messages/count-unread').then(function(r){return r.json();}).then(function(d){
            var b=document.getElementById('msg-badge');
            if(b&&d.unread>0){b.textContent=d.unread;b.style.display='inline';}
        }).catch(function(){});
        fetch('/admin/api/votes/count-new').then(function(r){return r.json();}).then(function(d){
            var b=document.getElementById('votes-badge');
            if(b&&d.new_votes>0){b.textContent=d.new_votes;b.style.display='inline';}
        }).catch(function(){});
    })();
    </script>
    <script src="/static/admin.js?v=22"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
