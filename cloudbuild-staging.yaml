# =============================================================
# LotoIA — STAGING deployment
# =============================================================
# Déploie sur hybride-api-staging (Cloud Run, europe-west1)
# Base : lotofrance_staging (même instance Cloud SQL)
# Min-instances : 0 (scale to zero, ~0€ au repos)
#
# Usage :
#   gcloud builds submit --config=cloudbuild-staging.yaml .
#
# Prérequis :
#   - Artifact Registry repo "hybride-api" dans europe-west1
#   - Base "lotofrance_staging" sur lotostat-eu
# =============================================================

substitutions:
  # SÉCURITÉ : _OWNER_IP et _OWNER_IPV6 ne doivent PAS contenir de vraies valeurs ici.
  # Les définir dans : Console GCP > Cloud Build > Triggers > [trigger] > Substitution variables
  # Ou via : gcloud builds submit --substitutions=_OWNER_IP=x.x.x.x,_OWNER_IPV6=prefix:
  _OWNER_IP: ''
  _OWNER_IPV6: ''
  _DB_NAME: 'lotofrance_staging'

steps:
  # Build Docker image (builder stage — includes tests/)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--target=builder'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/hybride-api/hybride-api:builder'
      - '.'

  # Lint (ruff)
  - name: 'europe-west1-docker.pkg.dev/$PROJECT_ID/hybride-api/hybride-api:builder'
    entrypoint: 'sh'
    args:
      - '-c'
      - 'pip install --no-cache-dir ruff && ruff check .'
    env:
      - 'HOME=/tmp'

  # Run tests inside the builder image (blocks deploy on failure)
  - name: 'europe-west1-docker.pkg.dev/$PROJECT_ID/hybride-api/hybride-api:builder'
    entrypoint: 'sh'
    args:
      - '-c'
      - 'pip install --no-cache-dir pytest pytest-asyncio pytest-cov PyPDF2 && python -m pytest tests/ -v --tb=short --cov=services --cov=routes --cov=config --cov=engine --cov=middleware --cov-report=term-missing -o addopts='
    env:
      - 'DB_PASSWORD=fake'
      - 'DB_USER=test'
      - 'DB_NAME=testdb'
      - 'HOME=/tmp'

  # Build final runtime image (lean, no tests)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--target=runtime'
      - '--cache-from'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/hybride-api/hybride-api:staging-latest'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/hybride-api/hybride-api:staging-$COMMIT_SHA'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/hybride-api/hybride-api:staging-latest'
      - '.'

  # Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'europe-west1-docker.pkg.dev/$PROJECT_ID/hybride-api/hybride-api:staging-$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'europe-west1-docker.pkg.dev/$PROJECT_ID/hybride-api/hybride-api:staging-latest']

  # Deploy to Cloud Run STAGING — no traffic (I10 V66: smoke test before routing)
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - run
      - deploy
      - hybride-api-staging
      - --image=europe-west1-docker.pkg.dev/$PROJECT_ID/hybride-api/hybride-api:staging-$COMMIT_SHA
      - --region=europe-west1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --concurrency=20
      - --max-instances=3
      - --min-instances=0
      - --timeout=120
      - --cpu-boost
      - --no-traffic
      - --liveness-probe=httpGet.path=/health,httpGet.port=8080
      - --startup-probe=httpGet.path=/health,httpGet.port=8080
      - '--update-env-vars=OWNER_IP=${_OWNER_IP},OWNER_IPV6=${_OWNER_IPV6},DB_NAME=${_DB_NAME}'

  # Smoke test /health on the new revision (I10 V66)
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        REVISION_URL=$$(gcloud run revisions list \
          --service=hybride-api-staging \
          --region=europe-west1 \
          --sort-by=~CREATED \
          --limit=1 \
          --format='value(status.url)' 2>/dev/null)
        if [ -z "$$REVISION_URL" ]; then
          echo "SMOKE TEST SKIPPED: could not resolve revision URL"
          exit 0
        fi
        echo "SMOKE TEST: curling $$REVISION_URL/health"
        HTTP_CODE=$$(curl -s -o /dev/null -w "%{http_code}" "$$REVISION_URL/health" --max-time 10 2>/dev/null || echo "000")
        if [ "$$HTTP_CODE" != "200" ]; then
          echo "SMOKE TEST FAILED: /health returned $$HTTP_CODE"
          exit 1
        fi
        echo "SMOKE TEST PASSED: /health returned 200"

  # Route 100% traffic to new revision (I10 V66)
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - run
      - services
      - update-traffic
      - hybride-api-staging
      - --to-latest
      - --region=europe-west1

images:
  - europe-west1-docker.pkg.dev/$PROJECT_ID/hybride-api/hybride-api:staging-$COMMIT_SHA
  - europe-west1-docker.pkg.dev/$PROJECT_ID/hybride-api/hybride-api:staging-latest
