[pytest]
pythonpath = .
testpaths = tests
addopts = --cov=engine --cov=services --cov=routes --cov-report=term-missing
asyncio_mode = strict
filterwarnings =
    ignore::ResourceWarning:asyncio.proactor_events
    ignore::ResourceWarning:anyio.streams.memory
markers =
    no_chat_logger_stub: opt-out de la fixture autouse Q+ qui mock chat_logger._do_insert (utilisé par tests/test_chat_logger.py)
